# ─────────────────────────────────────────────────────────────────────────────
# OPTION A (einfachster Weg):
#   Google Sheet auf "Jeder mit dem Link kann ansehen" setzen,
#   dann diese Datei KOMPLETT LEER lassen – keine Credentials nötig.
# ─────────────────────────────────────────────────────────────────────────────

# OPTION B (privates Sheet mit Service Account):
#   1. Google Cloud Console → Neues Projekt → "Google Sheets API" aktivieren
#   2. IAM → Service Account erstellen → JSON-Key herunterladen
#   3. Google Sheet mit der Service-Account-E-Mail teilen (Betrachter-Rechte)
#   4. JSON-Inhalt hier einfügen und bei Streamlit Cloud unter
#      Settings → Secrets die komplette secrets.toml hinterlegen.
#
# [connections.gsheets]
# spreadsheet = "https://docs.google.com/spreadsheets/d/1DKINRTQQHVPOEIrCpfyPiarmdxtOowI_GLVATMHz-SM/edit"
# worksheet = "Leads"
# type = "service_account"
# project_id = "DEIN_PROJECT_ID"
# private_key_id = "DEIN_KEY_ID"
# private_key = "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----\n"
# client_email = "dashboard@dein-projekt.iam.gserviceaccount.com"
# client_id = "DEIN_CLIENT_ID"
# auth_uri = "https://accounts.google.com/o/oauth2/auth"
# token_uri = "https://oauth2.googleapis.com/token"
